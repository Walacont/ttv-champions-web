<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC Champions - Coach Dashboard</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <meta name="description" content="Gamification-App für Tischtennisvereine">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SC Champions">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <header id="app-header"></header>

    <main id="app-main" class="pb-20">
        <div class="max-w-4xl mx-auto px-4 py-6">
            <h1 class="text-2xl font-bold text-gray-900 mb-6">Coach Dashboard</h1>

            <!-- Quick Actions -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button id="btn-training" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-left hover:border-blue-300 transition-colors">
                    <div class="text-2xl mb-2">📋</div>
                    <div class="font-medium">Training abschließen</div>
                    <div class="text-sm text-gray-500">Anwesenheit & Punkte</div>
                </button>
                <button id="btn-match" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-left hover:border-blue-300 transition-colors">
                    <div class="text-2xl mb-2">🏓</div>
                    <div class="font-medium">Spiel eintragen</div>
                    <div class="text-sm text-gray-500">Direkt bestätigt</div>
                </button>
                <button id="btn-challenge" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-left hover:border-blue-300 transition-colors">
                    <div class="text-2xl mb-2">🎯</div>
                    <div class="font-medium">Challenge erstellen</div>
                    <div class="text-sm text-gray-500">Neue Aufgabe</div>
                </button>
                <button id="btn-season" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 text-left hover:border-blue-300 transition-colors">
                    <div class="text-2xl mb-2">🏆</div>
                    <div class="font-medium">Saison verwalten</div>
                    <div class="text-sm text-gray-500">Start/Reset</div>
                </button>
            </div>

            <!-- Aktuelle Saison -->
            <div id="season-info" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                <h2 class="font-semibold text-gray-900 mb-4">Aktuelle Saison</h2>
                <div id="season-details">
                    <p class="text-gray-500">Lade...</p>
                </div>
            </div>

            <!-- Heutige Trainings -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-6">
                <div class="p-4 border-b border-gray-100">
                    <h2 class="font-semibold text-gray-900">Heutige Trainings</h2>
                </div>
                <div id="today-sessions" class="divide-y divide-gray-100">
                    <p class="p-4 text-gray-500">Lade...</p>
                </div>
            </div>

            <!-- Vereins-Spieler -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="p-4 border-b border-gray-100 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <h2 class="font-semibold text-gray-900">Spieler</h2>
                        <span id="player-count" class="text-sm text-gray-500"></span>
                    </div>
                    <button id="btn-add-player" class="bg-green-600 text-white px-3 py-1.5 text-sm rounded-lg hover:bg-green-700 flex items-center gap-1">
                        <span>+</span> Spieler hinzufügen
                    </button>
                </div>
                <div id="players-list" class="divide-y divide-gray-100 max-h-96 overflow-y-auto">
                    <p class="p-4 text-gray-500">Lade...</p>
                </div>
            </div>
        </div>

        <!-- Modals -->
        <div id="modal-container" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
            <div id="modal-content" class="bg-white rounded-xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
                <!-- Modal content wird dynamisch eingefügt -->
            </div>
        </div>
    </main>

    <nav id="app-nav"></nav>

    <!-- Ladebalken für SPA-Navigation -->
    <div id="page-loader" class="fixed top-0 left-0 w-full h-1 bg-blue-100 hidden z-50">
        <div class="h-full bg-blue-600 transition-all duration-300" style="width: 0%"></div>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>

    <script type="module">
        import { initAuth, getCurrentProfile, isCoach, supabase, createInvitationCode, formatCodeForDisplay } from './js/supabase-client.js';
        import { getCurrentSeason, startNewSeason, endCurrentSeason } from './js/points.js';
        import { createChallenge, createChallengeForm } from './js/challenges.js';
        import { calculateRank, createRankBadge } from './js/ranks.js';

        let profile = null;

        async function init() {
            await initAuth();
            profile = getCurrentProfile();

            if (!profile || !isCoach()) {
                window.location.href = 'index.html';
                return;
            }

            await Promise.all([
                loadSeasonInfo(),
                loadTodaySessions(),
                loadPlayers()
            ]);

            initEventListeners();

            // Header & Nav rendern
            const appModule = await import('./js/app.js');
        }

        async function loadSeasonInfo() {
            const season = await getCurrentSeason(profile.club_id);
            const container = document.getElementById('season-details');

            if (!season) {
                container.innerHTML = `
                    <p class="text-gray-500 mb-4">Keine aktive Saison</p>
                    <button id="start-season-btn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                        Neue Saison starten
                    </button>
                `;
                document.getElementById('start-season-btn')?.addEventListener('click', showStartSeasonModal);
            } else {
                const startDate = new Date(season.started_at).toLocaleDateString('de-DE');
                container.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="font-medium text-lg">${season.name}</div>
                            <div class="text-sm text-gray-500">Gestartet am ${startDate}</div>
                        </div>
                        <button id="end-season-btn" class="text-red-600 hover:text-red-800 text-sm">
                            Saison beenden
                        </button>
                    </div>
                `;
                document.getElementById('end-season-btn')?.addEventListener('click', handleEndSeason);
            }
        }

        async function loadTodaySessions() {
            const today = new Date().toISOString().split('T')[0];

            const { data: sessions } = await supabase
                .from('training_sessions')
                .select(`*, subgroup:subgroups(name)`)
                .eq('club_id', profile.club_id)
                .eq('date', today);

            const container = document.getElementById('today-sessions');

            if (!sessions || sessions.length === 0) {
                container.innerHTML = '<p class="p-4 text-gray-500">Keine Trainings heute</p>';
                return;
            }

            container.innerHTML = sessions.map(session => `
                <div class="p-4 flex items-center justify-between">
                    <div>
                        <div class="font-medium">${session.title}</div>
                        <div class="text-sm text-gray-500">
                            ${session.start_time?.slice(0,5) || ''} - ${session.end_time?.slice(0,5) || ''}
                            ${session.subgroup ? `• ${session.subgroup.name}` : ''}
                        </div>
                    </div>
                    ${session.completed ? `
                        <span class="text-green-600 text-sm">✓ Abgeschlossen</span>
                    ` : `
                        <button onclick="openTrainingModal('${session.id}')"
                                class="bg-blue-600 text-white px-4 py-2 text-sm rounded-lg hover:bg-blue-700">
                            Abschließen
                        </button>
                    `}
                </div>
            `).join('');
        }

        async function loadPlayers() {
            const { data: players } = await supabase
                .from('profiles')
                .select('*')
                .eq('club_id', profile.club_id)
                .eq('role', 'player')
                .order('first_name');

            document.getElementById('player-count').textContent = `${players?.length || 0} Spieler`;

            const container = document.getElementById('players-list');

            if (!players || players.length === 0) {
                container.innerHTML = '<p class="p-4 text-gray-500">Keine Spieler</p>';
                return;
            }

            container.innerHTML = players.map(player => {
                const rank = calculateRank(player.elo_rating, player.xp, player.grundlagen_completed || 0);
                return `
                    <div class="p-4 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-sm font-medium">
                                ${player.first_name?.charAt(0) || '?'}
                            </div>
                            <div>
                                <div class="font-medium">
                                    ${player.first_name} ${player.last_name}
                                    ${player.is_offline ? '<span class="ml-1 text-xs bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded">Offline</span>' : ''}
                                </div>
                                <div class="text-sm text-gray-500">
                                    ${player.elo_rating} Elo • ${player.xp} XP
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            ${createRankBadge(rank, 'sm')}
                            <button onclick="generateCodeForPlayer('${player.id}', '${player.first_name} ${player.last_name}')"
                                    class="text-blue-600 hover:text-blue-800 p-1" title="Code generieren">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function initEventListeners() {
            document.getElementById('btn-training').addEventListener('click', () => {
                window.location.href = 'training.html';
            });

            document.getElementById('btn-match').addEventListener('click', () => {
                window.location.href = 'matches.html';
            });

            document.getElementById('btn-challenge').addEventListener('click', showChallengeModal);

            document.getElementById('btn-season').addEventListener('click', showStartSeasonModal);

            document.getElementById('btn-add-player').addEventListener('click', showAddPlayerModal);

            // Modal schließen
            document.getElementById('modal-container').addEventListener('click', (e) => {
                if (e.target.id === 'modal-container') {
                    closeModal();
                }
            });
        }

        function showAddPlayerModal() {
            showModal(`
                <div class="p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold">Spieler hinzufügen</h2>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">✕</button>
                    </div>
                    <p class="text-gray-600 text-sm mb-4">
                        Erstelle einen Offline-Spieler (ohne eigenes Konto). Der Spieler kann sich später mit einem Einladungs-Code anmelden.
                    </p>
                    <form id="add-player-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Vorname *</label>
                                <input type="text" name="firstName" required
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nachname *</label>
                                <input type="text" name="lastName" required
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">E-Mail (optional)</label>
                            <input type="email" name="email"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg"
                                   placeholder="Optional für spätere Kontoverknüpfung">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Geburtsdatum</label>
                                <input type="date" name="birthdate"
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Geschlecht</label>
                                <select name="gender" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                                    <option value="">-- Auswählen --</option>
                                    <option value="M">Männlich</option>
                                    <option value="F">Weiblich</option>
                                </select>
                            </div>
                        </div>
                        <div id="add-player-error" class="hidden text-red-600 text-sm bg-red-50 p-3 rounded-lg"></div>
                        <button type="submit"
                                class="w-full bg-green-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-green-700">
                            Spieler erstellen
                        </button>
                    </form>
                </div>
            `);

            document.getElementById('add-player-form').addEventListener('submit', handleAddPlayer);
        }

        async function handleAddPlayer(e) {
            e.preventDefault();
            const form = e.target;
            const errorDiv = document.getElementById('add-player-error');

            const firstName = form.firstName.value.trim();
            const lastName = form.lastName.value.trim();
            const email = form.email.value.trim() || null;
            const birthdate = form.birthdate.value || null;
            const gender = form.gender.value || null;

            try {
                // Offline-Spieler erstellen (ohne Auth-Benutzer)
                const { data: newPlayer, error } = await supabase
                    .from('profiles')
                    .insert({
                        id: crypto.randomUUID(), // Generiere eine UUID
                        email: email || `offline_${Date.now()}@sc-champions.local`,
                        first_name: firstName,
                        last_name: lastName,
                        birthdate: birthdate,
                        gender: gender,
                        club_id: profile.club_id,
                        role: 'player',
                        is_offline: true,
                        elo_rating: 800,
                        xp: 0,
                        season_points: 0
                    })
                    .select()
                    .single();

                if (error) throw error;

                // Einladungs-Code für den Spieler erstellen (wie im Main Branch)
                const codeResult = await createInvitationCode(newPlayer.id, profile.club_id, {
                    firstName: firstName,
                    lastName: lastName,
                    birthdate: birthdate,
                    gender: gender
                });

                if (codeResult.success) {
                    const formattedCode = formatCodeForDisplay(codeResult.code);
                    showModal(`
                        <div class="p-6 text-center">
                            <div class="text-5xl mb-4">✅</div>
                            <h2 class="text-xl font-bold mb-2">Spieler erstellt!</h2>
                            <p class="text-gray-600 mb-4">${firstName} ${lastName} wurde hinzugefügt.</p>

                            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                                <p class="text-sm text-blue-800 mb-2">Einladungs-Code:</p>
                                <p class="text-3xl font-mono font-bold text-blue-600 tracking-wider">${formattedCode}</p>
                            </div>

                            <p class="text-gray-500 text-sm mb-4">
                                Mit diesem Code kann sich ${firstName} in der App anmelden.
                            </p>

                            <button onclick="closeModal(); loadPlayers();"
                                    class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700">
                                Fertig
                            </button>
                        </div>
                    `);
                } else {
                    alert('Spieler erstellt, aber Code-Generierung fehlgeschlagen.');
                    closeModal();
                    await loadPlayers();
                }
            } catch (error) {
                console.error('Fehler beim Erstellen:', error);
                errorDiv.textContent = error.message || 'Ein Fehler ist aufgetreten';
                errorDiv.classList.remove('hidden');
            }
        }

        async function generateCodeForPlayer(playerId, playerName) {
            const result = await createInvitationCode(playerId, profile.club_id);

            if (result.success) {
                const formattedCode = formatCodeForDisplay(result.code);
                showModal(`
                    <div class="p-6 text-center">
                        <h2 class="text-xl font-bold mb-4">Neuer Einladungs-Code</h2>
                        <p class="text-gray-600 mb-4">Code für ${playerName}:</p>

                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                            <p class="text-3xl font-mono font-bold text-blue-600 tracking-wider">${formattedCode}</p>
                        </div>

                        <button onclick="closeModal()"
                                class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700">
                            Fertig
                        </button>
                    </div>
                `);
            } else {
                alert('Fehler: ' + result.error);
            }
        }
        window.generateCodeForPlayer = generateCodeForPlayer;
        window.loadPlayers = loadPlayers;

        function showModal(content) {
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal-container').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }
        window.closeModal = closeModal;

        function showChallengeModal() {
            showModal(`
                <div class="p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold">Challenge erstellen</h2>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">✕</button>
                    </div>
                    ${createChallengeForm()}
                </div>
            `);

            document.getElementById('challenge-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);

                const result = await createChallenge({
                    title: formData.get('title'),
                    description: formData.get('description'),
                    xpReward: parseInt(formData.get('xpReward')),
                    pointsReward: parseInt(formData.get('pointsReward') || 0)
                });

                if (result.success) {
                    alert('Challenge erstellt!');
                    closeModal();
                } else {
                    alert('Fehler: ' + result.error);
                }
            });
        }

        function showStartSeasonModal() {
            showModal(`
                <div class="p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold">Neue Saison starten</h2>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">✕</button>
                    </div>
                    <p class="text-gray-600 mb-4">
                        Beim Starten einer neuen Saison werden alle Saisonpunkte auf 0 zurückgesetzt.
                        XP und Elo bleiben erhalten.
                    </p>
                    <form id="season-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Saison-Name</label>
                            <input type="text" name="name" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg"
                                   placeholder="z.B. Frühjahr 2024">
                        </div>
                        <button type="submit"
                                class="w-full bg-green-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-green-700">
                            Saison starten
                        </button>
                    </form>
                </div>
            `);

            document.getElementById('season-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);

                const result = await startNewSeason(profile.club_id, formData.get('name'), profile.id);

                if (result.success) {
                    alert('Saison gestartet!');
                    closeModal();
                    await loadSeasonInfo();
                } else {
                    alert('Fehler: ' + result.error);
                }
            });
        }

        async function handleEndSeason() {
            if (!confirm('Saison wirklich beenden?')) return;

            const result = await endCurrentSeason(profile.club_id);

            if (result.success) {
                alert('Saison beendet!');
                await loadSeasonInfo();
            } else {
                alert('Fehler: ' + result.error);
            }
        }

        window.openTrainingModal = (sessionId) => {
            // Vereinfachte Version - In der vollständigen App würde hier ein komplettes Modal sein
            alert('Training-Abschluss-Modal würde hier öffnen für Session: ' + sessionId);
        };

        init();
    </script>
</body>
</html>
