<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TTV Champions</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <meta name="description" content="Gamification-App für Tischtennisvereine">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TTV Champions">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header id="app-header"></header>

    <!-- SPA Page Container -->
    <main id="app-main" class="pb-20">
        <!-- Content wird via SPA-Router geladen -->
        <div id="loading-screen" class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-gray-600">Lade...</p>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="app-nav"></nav>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 w-80 space-y-2"></div>

    <!-- Ladebalken für SPA-Navigation -->
    <div id="page-loader" class="fixed top-0 left-0 w-full h-1 bg-blue-100 hidden z-50">
        <div class="h-full bg-blue-600 transition-all duration-300" style="width: 0%"></div>
    </div>

    <!-- Service Worker Registration -->
    <script>
        // Service Worker registrieren
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const registration = await navigator.serviceWorker.register('/prototype/sw.js');
                    console.log('Service Worker registriert:', registration.scope);
                } catch (error) {
                    console.log('Service Worker Registrierung fehlgeschlagen:', error);
                }
            });
        }
    </script>

    <!-- App Script -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
