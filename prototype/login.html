<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TTV Champions - Anmelden</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <meta name="description" content="Gamification-App für Tischtennisvereine">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TTV Champions">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <span class="text-6xl">🏓</span>
            <h1 class="text-3xl font-bold text-gray-900 mt-4">TTV Champions</h1>
            <p class="text-gray-600 mt-2">Gamification für Tischtennis</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">E-Mail</label>
                    <input type="email" name="email" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="deine@email.de">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Passwort</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="••••••••">
                </div>

                <div id="login-error" class="hidden text-red-600 text-sm bg-red-50 p-3 rounded-lg"></div>

                <button type="submit"
                        class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700 transition-colors">
                    Anmelden
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600 text-sm">
                    Noch kein Konto?
                    <a href="#" id="show-register" class="text-blue-600 hover:text-blue-800 font-medium">Registrieren</a>
                </p>
            </div>
        </div>

        <!-- Register Form (hidden) -->
        <div id="register-section" class="hidden bg-white rounded-xl shadow-lg p-6 border border-gray-200 mt-4">
            <h2 class="text-xl font-bold text-gray-900 mb-4">Registrieren</h2>
            <form id="register-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Vorname</label>
                        <input type="text" name="firstName" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nachname</label>
                        <input type="text" name="lastName" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">E-Mail</label>
                    <input type="email" name="email" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Passwort</label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div id="register-error" class="hidden text-red-600 text-sm bg-red-50 p-3 rounded-lg"></div>

                <button type="submit"
                        class="w-full bg-green-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-green-700 transition-colors">
                    Registrieren
                </button>
            </form>

            <div class="mt-4 text-center">
                <a href="#" id="show-login" class="text-gray-600 text-sm hover:text-gray-800">
                    ← Zurück zur Anmeldung
                </a>
            </div>
        </div>

        <!-- Info -->
        <p class="text-center text-gray-500 text-xs mt-6">
            TTV Champions Prototyp - Bachelorarbeit
        </p>
    </div>

    <script type="module">
        import { login, register } from './js/supabase-client.js';

        // Toggle zwischen Login und Register
        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-form').parentElement.classList.add('hidden');
            document.getElementById('register-section').classList.remove('hidden');
        });

        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-form').parentElement.classList.remove('hidden');
            document.getElementById('register-section').classList.add('hidden');
        });

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorDiv = document.getElementById('login-error');

            try {
                const result = await login(formData.get('email'), formData.get('password'));

                if (result.success) {
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = result.error || 'Anmeldung fehlgeschlagen';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Ein Fehler ist aufgetreten';
                errorDiv.classList.remove('hidden');
            }
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorDiv = document.getElementById('register-error');

            try {
                const result = await register(
                    formData.get('email'),
                    formData.get('password'),
                    formData.get('firstName'),
                    formData.get('lastName')
                );

                if (result.success) {
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = result.error || 'Registrierung fehlgeschlagen';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Ein Fehler ist aufgetreten';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
