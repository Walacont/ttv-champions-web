<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTV Champions - Spiel eintragen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <header id="app-header"></header>

    <main id="app-main" class="pb-20">
        <div class="max-w-4xl mx-auto px-4 py-6">
            <h1 class="text-2xl font-bold text-gray-900 mb-6">Spiel eintragen</h1>

            <!-- Spieltyp-Auswahl -->
            <div class="flex gap-4 mb-6">
                <button id="singles-tab" class="flex-1 py-3 px-4 bg-blue-600 text-white rounded-lg font-medium">
                    Einzel
                </button>
                <button id="doubles-tab" class="flex-1 py-3 px-4 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300">
                    Doppel
                </button>
            </div>

            <!-- Einzel-Formular -->
            <div id="singles-form" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <form id="match-form" class="space-y-6">
                    <!-- Gegner auswählen -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Gegner</label>
                        <select id="opponent-select" name="opponent" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="">Gegner auswählen...</option>
                        </select>
                    </div>

                    <!-- Handicap-Empfehlung -->
                    <div id="handicap-recommendation" class="hidden bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-yellow-600">⚖️</span>
                            <span class="font-medium text-yellow-800">Handicap empfohlen</span>
                        </div>
                        <p id="handicap-text" class="text-sm text-yellow-700"></p>
                        <label class="flex items-center gap-2 mt-3">
                            <input type="checkbox" name="useHandicap" class="rounded text-blue-600">
                            <span class="text-sm">Handicap verwenden</span>
                        </label>
                    </div>

                    <!-- Satzergebnisse -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Satzergebnisse</label>
                        <div id="sets-container" class="space-y-3">
                            <!-- Sätze werden dynamisch hinzugefügt -->
                        </div>
                        <button type="button" id="add-set-btn"
                                class="mt-3 text-sm text-blue-600 hover:text-blue-800">
                            + Satz hinzufügen
                        </button>
                    </div>

                    <!-- Fehleranzeige -->
                    <div id="match-error" class="hidden text-red-600 text-sm bg-red-50 p-3 rounded-lg"></div>

                    <!-- Submit -->
                    <button type="submit"
                            class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700 transition-colors">
                        Spiel eintragen
                    </button>
                </form>
            </div>

            <!-- Doppel-Formular (hidden) -->
            <div id="doubles-form" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <p class="text-gray-500 text-center py-8">Doppel-Formular - Wird noch implementiert</p>
            </div>

            <!-- Ausstehende Bestätigungen -->
            <div class="mt-6 bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="p-4 border-b border-gray-100">
                    <h2 class="font-semibold text-gray-900">Ausstehende Bestätigungen</h2>
                </div>
                <div id="pending-matches" class="divide-y divide-gray-100">
                    <div class="p-4 text-center text-gray-500">Keine ausstehenden Anfragen</div>
                </div>
            </div>
        </div>
    </main>

    <nav id="app-nav"></nav>

    <script type="module">
        import { initAuth, getCurrentProfile, supabase } from './js/supabase-client.js';
        import { createMatch, getPendingMatchRequests, confirmMatch, rejectMatch, getMatchHandicap, validateSetScores } from './js/matches.js';

        let profile = null;
        let players = [];
        let selectedOpponent = null;

        async function init() {
            await initAuth();
            profile = getCurrentProfile();

            if (!profile) {
                window.location.href = 'login.html';
                return;
            }

            await loadPlayers();
            initSetInputs();
            initEventListeners();
            await loadPendingMatches();

            // Header & Nav rendern
            const appModule = await import('./js/app.js');
        }

        async function loadPlayers() {
            if (!profile.club_id) return;

            const { data } = await supabase
                .from('profiles')
                .select('id, first_name, last_name, elo_rating')
                .eq('club_id', profile.club_id)
                .eq('role', 'player')
                .neq('id', profile.id)
                .order('first_name');

            players = data || [];

            const select = document.getElementById('opponent-select');
            select.innerHTML = '<option value="">Gegner auswählen...</option>' +
                players.map(p => `<option value="${p.id}">${p.first_name} ${p.last_name} (${p.elo_rating} Elo)</option>`).join('');
        }

        function initSetInputs() {
            const container = document.getElementById('sets-container');
            container.innerHTML = '';

            // 3 Sätze initial
            for (let i = 0; i < 3; i++) {
                addSetInput(i + 1);
            }
        }

        function addSetInput(setNumber) {
            const container = document.getElementById('sets-container');
            const setDiv = document.createElement('div');
            setDiv.className = 'set-input flex items-center gap-3';
            setDiv.innerHTML = `
                <span class="text-sm text-gray-500 w-16">Satz ${setNumber}</span>
                <input type="number" name="set_${setNumber}_a" min="0" max="99" placeholder="Du"
                       class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-center">
                <span class="text-gray-400">:</span>
                <input type="number" name="set_${setNumber}_b" min="0" max="99" placeholder="Gegner"
                       class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-center">
                ${setNumber > 3 ? `
                    <button type="button" class="remove-set text-red-500 hover:text-red-700">✕</button>
                ` : ''}
            `;

            if (setNumber > 3) {
                setDiv.querySelector('.remove-set').addEventListener('click', () => setDiv.remove());
            }

            container.appendChild(setDiv);
        }

        function initEventListeners() {
            // Tab-Wechsel
            document.getElementById('singles-tab').addEventListener('click', () => {
                document.getElementById('singles-tab').classList.add('bg-blue-600', 'text-white');
                document.getElementById('singles-tab').classList.remove('bg-gray-200', 'text-gray-700');
                document.getElementById('doubles-tab').classList.remove('bg-blue-600', 'text-white');
                document.getElementById('doubles-tab').classList.add('bg-gray-200', 'text-gray-700');
                document.getElementById('singles-form').classList.remove('hidden');
                document.getElementById('doubles-form').classList.add('hidden');
            });

            document.getElementById('doubles-tab').addEventListener('click', () => {
                document.getElementById('doubles-tab').classList.add('bg-blue-600', 'text-white');
                document.getElementById('doubles-tab').classList.remove('bg-gray-200', 'text-gray-700');
                document.getElementById('singles-tab').classList.remove('bg-blue-600', 'text-white');
                document.getElementById('singles-tab').classList.add('bg-gray-200', 'text-gray-700');
                document.getElementById('doubles-form').classList.remove('hidden');
                document.getElementById('singles-form').classList.add('hidden');
            });

            // Gegner-Auswahl
            document.getElementById('opponent-select').addEventListener('change', async (e) => {
                selectedOpponent = players.find(p => p.id === e.target.value);
                if (selectedOpponent) {
                    await checkHandicap();
                } else {
                    document.getElementById('handicap-recommendation').classList.add('hidden');
                }
            });

            // Satz hinzufügen
            document.getElementById('add-set-btn').addEventListener('click', () => {
                const count = document.querySelectorAll('.set-input').length;
                if (count < 7) {
                    addSetInput(count + 1);
                }
            });

            // Formular absenden
            document.getElementById('match-form').addEventListener('submit', handleSubmit);
        }

        async function checkHandicap() {
            if (!selectedOpponent) return;

            const recommendation = await getMatchHandicap(profile.id, selectedOpponent.id);

            if (recommendation.recommended) {
                document.getElementById('handicap-recommendation').classList.remove('hidden');
                document.getElementById('handicap-text').textContent = recommendation.description;
            } else {
                document.getElementById('handicap-recommendation').classList.add('hidden');
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('match-error');
            errorDiv.classList.add('hidden');

            if (!selectedOpponent) {
                errorDiv.textContent = 'Bitte wähle einen Gegner aus';
                errorDiv.classList.remove('hidden');
                return;
            }

            // Satzergebnisse sammeln
            const sets = [];
            document.querySelectorAll('.set-input').forEach((setDiv, index) => {
                const scoreA = parseInt(setDiv.querySelector(`input[name="set_${index + 1}_a"]`).value);
                const scoreB = parseInt(setDiv.querySelector(`input[name="set_${index + 1}_b"]`).value);

                if (!isNaN(scoreA) && !isNaN(scoreB) && (scoreA > 0 || scoreB > 0)) {
                    sets.push({ player_a: scoreA, player_b: scoreB });
                }
            });

            // Validieren
            const validation = validateSetScores(sets);
            if (!validation.valid) {
                errorDiv.textContent = validation.error;
                errorDiv.classList.remove('hidden');
                return;
            }

            // Handicap
            const useHandicap = document.querySelector('input[name="useHandicap"]')?.checked || false;

            // Match erstellen
            const result = await createMatch({
                playerAId: profile.id,
                playerBId: selectedOpponent.id,
                sets,
                handicapUsed: useHandicap
            });

            if (result.success) {
                alert('Spiel erfolgreich eingetragen!');
                initSetInputs();
                document.getElementById('opponent-select').value = '';
                selectedOpponent = null;
                document.getElementById('handicap-recommendation').classList.add('hidden');
                await loadPendingMatches();
            } else {
                errorDiv.textContent = result.error || 'Fehler beim Eintragen';
                errorDiv.classList.remove('hidden');
            }
        }

        async function loadPendingMatches() {
            const matches = await getPendingMatchRequests();
            const container = document.getElementById('pending-matches');

            if (matches.length === 0) {
                container.innerHTML = '<div class="p-4 text-center text-gray-500">Keine ausstehenden Anfragen</div>';
                return;
            }

            container.innerHTML = matches.map(match => `
                <div class="p-4 flex items-center justify-between">
                    <div>
                        <div class="font-medium">
                            ${match.player_a?.first_name} ${match.player_a?.last_name}
                        </div>
                        <div class="text-sm text-gray-500">
                            ${match.player_a_sets_won}:${match.player_b_sets_won}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="handleConfirm('${match.id}')"
                                class="px-4 py-2 bg-green-500 text-white text-sm rounded-lg hover:bg-green-600">
                            Bestätigen
                        </button>
                        <button onclick="handleReject('${match.id}')"
                                class="px-4 py-2 bg-red-500 text-white text-sm rounded-lg hover:bg-red-600">
                            Ablehnen
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.handleConfirm = async (matchId) => {
            const result = await confirmMatch(matchId);
            if (result.success) {
                alert('Spiel bestätigt!');
                await loadPendingMatches();
            }
        };

        window.handleReject = async (matchId) => {
            const result = await rejectMatch(matchId);
            if (result.success) {
                await loadPendingMatches();
            }
        };

        init();
    </script>
</body>
</html>
