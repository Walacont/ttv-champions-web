<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <script src="/js/capacitor-init.js"></script>
        <title>Profil - SC Champions</title>

        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

        <!-- PWA Meta Tags -->
        <link rel="manifest" href="/manifest.json" />
        <meta name="theme-color" content="#1e3a5f" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="SC Champions" />
        <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
        <meta name="mobile-web-app-capable" content="yes" />

        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <link rel="stylesheet" href="/css/spa-enhancements.css" />
        <link rel="stylesheet" href="/css/mobile-fixes.css" />
        <style>
            body {
                font-family: 'Inter', sans-serif;
            }
            #page-loader {
                display: flex;
                justify-content: center;
                align-items: center;
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: #f3f4f6;
                z-index: 9999;
            }
            #main-content {
                display: none;
            }
            .profile-header-gradient {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            .stat-card {
                transition: transform 0.2s;
            }
            .stat-card:hover {
                transform: translateY(-2px);
            }
        </style>
    </head>
    <body class="bg-gray-100 text-gray-800">
        <div id="page-loader">
            <svg
                class="animate-spin h-10 w-10 text-indigo-600"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
            >
                <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"
                ></circle>
                <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
            </svg>
        </div>

        <div id="main-content" class="min-h-screen">
            <!-- Header with gradient background -->
            <div class="profile-header-gradient text-white">
                <div class="container mx-auto px-4 pt-4 pb-24">
                    <!-- Top Navigation -->
                    <div class="flex justify-between items-center mb-6">
                        <button
                            onclick="window.location.href = document.referrer.includes('dashboard') ? document.referrer : '/dashboard.html#community'"
                            class="text-white hover:text-gray-200 transition"
                        >
                            <i class="fas fa-arrow-left text-xl"></i>
                        </button>
                        <button
                            id="profile-menu-btn"
                            class="text-white hover:text-gray-200 transition"
                        >
                            <i class="fas fa-ellipsis-h text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Profile Card (overlapping header) -->
            <div class="container mx-auto px-4 -mt-20">
                <!-- Avatar outside the card to prevent clipping -->
                <div class="flex justify-center sm:justify-start mb-4">
                    <img
                        id="profile-avatar"
                        src="https://placehold.co/120x120/e2e8f0/64748b?text=..."
                        alt="Profilbild"
                        class="h-28 w-28 rounded-full object-cover border-4 border-white shadow-lg bg-white"
                    />
                </div>

                <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                    <!-- Profile Info Section -->
                    <div class="p-6">
                        <div class="flex flex-col sm:flex-row items-center sm:items-start gap-4">
                            <!-- Name and Location -->
                            <div class="text-center sm:text-left flex-1">
                                <h1 id="profile-name" class="text-2xl font-bold text-gray-900">
                                    Laden...
                                </h1>
                                <p id="profile-location" class="text-gray-500 mt-1">
                                    <i class="fas fa-map-marker-alt mr-1"></i>
                                    <span>-</span>
                                </p>
                            </div>

                            <!-- Follow Button -->
                            <div id="follow-button-container" class="mt-2 sm:mt-0">
                                <!-- Button wird dynamisch eingefügt -->
                            </div>
                        </div>

                        <!-- Bio -->
                        <div id="profile-bio-container" class="mt-4 hidden">
                            <p id="profile-bio" class="text-gray-600 text-center sm:text-left">
                            </p>
                        </div>

                        <!-- Follower Stats -->
                        <div class="flex justify-center sm:justify-start gap-6 mt-4 pt-4 border-t">
                            <div class="text-center">
                                <span id="following-count" class="text-xl font-bold text-gray-900">0</span>
                                <p class="text-sm text-gray-500">Gefolgt</p>
                            </div>
                            <div class="text-center">
                                <span id="followers-count" class="text-xl font-bold text-gray-900">0</span>
                                <p class="text-sm text-gray-500">Abonnenten</p>
                            </div>
                        </div>
                    </div>

                    <!-- Private Profile Notice -->
                    <div id="private-profile-notice" class="hidden bg-gray-50 p-6 border-t">
                        <div class="text-center">
                            <i class="fas fa-lock text-4xl text-gray-400 mb-3"></i>
                            <h3 class="text-lg font-semibold text-gray-700">Dieses Profil ist privat</h3>
                            <p class="text-gray-500 mt-1">Folge dieser Person, um Aktivitäten, Erfolge und mehr zu sehen</p>
                        </div>
                    </div>

                    <!-- Public Profile Content -->
                    <div id="public-profile-content" class="hidden">
                        <!-- Stats Grid -->
                        <div class="p-6 border-t">
                            <h2 class="text-lg font-semibold text-gray-800 mb-4">
                                <i class="fas fa-chart-bar mr-2 text-indigo-600"></i>Statistiken
                            </h2>
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                <div class="stat-card bg-gradient-to-br from-indigo-50 to-indigo-100 p-4 rounded-xl text-center">
                                    <i class="fas fa-bolt text-indigo-600 text-xl mb-2"></i>
                                    <p id="stat-elo" class="text-2xl font-bold text-indigo-600">-</p>
                                    <p class="text-xs text-gray-600">Elo Rating</p>
                                </div>
                                <div class="stat-card bg-gradient-to-br from-green-50 to-green-100 p-4 rounded-xl text-center">
                                    <i class="fas fa-trophy text-green-600 text-xl mb-2"></i>
                                    <p id="stat-wins" class="text-2xl font-bold text-green-600">-</p>
                                    <p class="text-xs text-gray-600">Siege</p>
                                </div>
                                <div class="stat-card bg-gradient-to-br from-orange-50 to-orange-100 p-4 rounded-xl text-center">
                                    <i class="fas fa-table-tennis-paddle-ball text-orange-600 text-xl mb-2"></i>
                                    <p id="stat-matches" class="text-2xl font-bold text-orange-600">-</p>
                                    <p class="text-xs text-gray-600">Matches</p>
                                </div>
                                <div class="stat-card bg-gradient-to-br from-purple-50 to-purple-100 p-4 rounded-xl text-center">
                                    <i class="fas fa-star text-purple-600 text-xl mb-2"></i>
                                    <p id="stat-points" class="text-2xl font-bold text-purple-600">-</p>
                                    <p class="text-xs text-gray-600">Punkte</p>
                                </div>
                            </div>
                        </div>

                        <!-- Club Section -->
                        <div id="club-section" class="p-6 border-t hidden">
                            <h2 class="text-lg font-semibold text-gray-800 mb-4">
                                <i class="fas fa-users mr-2 text-indigo-600"></i>Verein
                            </h2>
                            <div id="club-info" class="bg-gray-50 p-4 rounded-xl flex items-center gap-4">
                                <div class="h-12 w-12 bg-indigo-100 rounded-full flex items-center justify-center">
                                    <i class="fas fa-building text-indigo-600"></i>
                                </div>
                                <div>
                                    <p id="club-name" class="font-semibold text-gray-800">-</p>
                                    <p id="club-members" class="text-sm text-gray-500">- Mitglieder</p>
                                </div>
                            </div>
                        </div>

                        <!-- Recent Activity Preview -->
                        <div id="activity-section" class="p-6 border-t bg-gray-50 hidden">
                            <h2 class="text-lg font-semibold text-gray-800 mb-4">
                                <i class="fas fa-history mr-2 text-indigo-600"></i>Letzte Aktivität
                            </h2>
                            <div id="recent-matches">
                                <p class="text-gray-400 text-center py-4 text-sm">
                                    Keine Aktivitäten
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Mutual Friends Section -->
                <div id="mutual-friends-section" class="bg-white rounded-2xl shadow-lg mt-4 p-6 hidden">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">
                        <i class="fas fa-user-friends mr-2 text-indigo-600"></i>Gemeinsame Freunde
                    </h2>
                    <div id="mutual-friends-list" class="flex flex-wrap gap-3">
                        <!-- Wird dynamisch gefüllt -->
                    </div>
                </div>
            </div>

            <!-- Bottom Padding -->
            <div class="h-8"></div>
        </div>

        <!-- Scripts -->
        <script src="/js/update-checker.js"></script>
        <script src="/js/pwa-register.js"></script>
        <script type="module" src="/js/profile-view-supabase.js"></script>
    </body>
</html>
